<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Glocal Reciprocal College</title>
    <link rel="stylesheet" href="loginpage.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>GRC</h1>
            </div>
            <a href="homepage.html" class="back-link">← Back to Home</a>
        </header>

        <main class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your student account</p>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                        <span class="input-icon">📧</span>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                        <span class="input-icon">🔒</span>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>
                </form>

                <div class="divider">
                    <span>or</span>
                </div>

                <div class="social-login">
                    <button class="social-btn google">Continue with Google</button>
                    <button class="social-btn microsoft">Continue with Microsoft</button>
                </div>

                <p class="signup-link">
                    Don't have an account? <a href="#">Sign up here</a>
                </p>
            </div>
        </main>
    </div>

    <script src="loginpage.js"></script>
</body>
</html>
